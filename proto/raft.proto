syntax = "proto3";

package raftkv;

option go_package = "github.com/KYash03/raft-kv/pb;pb";

service Raft {
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
}

service KV {
  rpc Put(PutRequest) returns (KVResponse);
  rpc Get(GetRequest) returns (KVResponse);
  rpc Delete(DeleteRequest) returns (KVResponse);
}

message LogEntry {
  uint64 term = 1;
  uint64 index = 2;
  bytes  cmd = 3;
}

message RequestVoteRequest {
  uint64 term = 1;
  uint64 candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message RequestVoteResponse {
  uint64 term = 1;
  bool   vote_granted = 2;
}

message AppendEntriesRequest {
  uint64 term = 1;
  uint64 leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated LogEntry entries = 5;
  uint64 leader_commit = 6;
}

message AppendEntriesResponse {
  uint64 term = 1;
  bool   success = 2;
  // hint so leader can skip nextIndex back faster
  uint64 conflict_index = 3;
}

message PutRequest {
  string key = 1;
  string value = 2;
}

message GetRequest {
  string key = 1;
}

message DeleteRequest {
  string key = 1;
}

message KVResponse {
  bool   ok = 1;
  string value = 2;
  // address of the leader if we know it, so client can retry there
  string leader_hint = 3;
  string error = 4;
}
